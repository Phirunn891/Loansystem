<div class="dashboard-container">
  <!-- Top-Level Layout: Sidebar stays fixed on the left -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo-box"><i class="fas fa-university"></i></div>
      <div class="brand">
        <h4 class="brand-name">Atelier Finance</h4>
        <span class="brand-tag">PREMIUM LENDING</span>
      </div>
    </div>

    <!-- Grouped Sidebar Items -->
    <nav class="nav-menu">
      <a *ngFor="let item of sidebarItems" 
         class="nav-item" 
         [class.active]="item.active" 
         [routerLink]="item.route">
        <i [class]="item.icon"></i>
        <span>{{item.label}}</span>
      </a>
    </nav>

    <!-- Sidebar Bottom Actions -->
    <div class="sidebar-bottom">
      <!-- Special Action for "Applications" flow, but here in layout for global access if needed -->
      <button class="apply-btn" routerLink="/classicloan">
        <i class="fas fa-plus"></i> Apply for New Loan
      </button>

      <div class="bottom-links">
        <a class="nav-item"><i class="fas fa-cog"></i> Settings</a>
        <!-- Direct Link to Login (for logging out) -->
        <a class="nav-item" routerLink="/loginbank">
          <i class="fas fa-sign-out-alt"></i> Logout
        </a>
      </div>
    </div>
  </aside>

  <!-- The Router Outlet where dynamic child pages will be injected -->
  <main class="main-content-area">
    <router-outlet></router-outlet>
  </main>
</div>
